<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Personalization Testing Sandbox</title>
     
<!-- webruntime-branding-shared stylesheets ->
<script type="text/javascript" src="https://cdn.c360a.salesforce.com/beacon/c360a/f2ebe5ea-d94e-4e07-949d-a64e24d3dea3/scripts/c360a.min.js"></script>
<script>
SalesforceInteractions.init({
consents:
[{
provider: 'OneTrust',
purpose: 'Tracking',
status: SalesforceInteractions.ConsentStatus.OptIn
}]
}).then(() => {
console.log('init successful');
});
</script>
    
      <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
        .product-card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background-color: #f9f9f9; }
        .btn { background-color: #0176d3; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn:hover { background-color: #015ba1; }
        .form-group { margin-bottom: 15px; }
        input[type="email"] { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        .hero-banner { background: #e0f2fe; padding: 30px; border-radius: 8px; margin-bottom: 30px; text-align: center; }
        .spacer { height: 800px; background: linear-gradient(#ffffff, #f0f0f0); margin: 20px 0; border: 1px dashed #ccc; text-align: center; padding-top: 20px; color: #999; }
    </style>
</head>
<body>

    <div id="hero-personalization-zone" class="hero-banner">
        <h2>Default Welcome Banner new</h2>
        <p>This is standard text. Later, you can test replacing this with a personalization campaign action zone!</p>
    </div>

    <div class="product-card" data-item-type="Product" data-item-id="MOCK-BIKE-77" data-item-name="Apex Trail Runner" data-item-price="1200.00" data-item-category="Mountain Bikes">
        <span style="color: #666; font-size: 12px; font-weight: bold; text-transform: uppercase;">Category: Mountain Bikes</span>
        <h2>Apex Trail Runner Electric Bike</h2>
        <p>Item ID: <strong>MOCK-BIKE-77</strong></p>
        <p style="font-size: 18px; color: #0176d3; font-weight: bold;">$1,200.00</p>
        
        <button class="btn" id="btn-view-product">Simulate View Product</button>
        <button class="btn" id="btn-add-to-cart" style="background-color: #2e7d32;">Add to Cart</button>
    </div>

    <div class="spacer">Scroll down to find the login block...</div>

    <div class="product-card" id="login-section">
        <h3>User Identification Test</h3>
        <p>Test your Identity Maps and profile capturing setups.</p>
        <div class="form-group">
            <input type="email" id="testEmailInput" placeholder="enter-test-email@domain.com">
            <button class="btn" id="btn-submit-identity">Submit Login / Email</button>
        </div>
    </div>

    <script type="text/javascript">
        window.scrollStartTime = Date.now();
        window.totalScrollTimeSeconds = 0;
        
        // Accumulate active page time when scrolling happens
        window.addEventListener('scroll', function() {
            window.totalScrollTimeSeconds = Math.round((Date.now() - window.scrollStartTime) / 1000);
        }, { passive: true });
    </script>
</body>
</html>
